<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Zapisy na Warsztaty – VIA English Academy</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>

body{
  font-family:'DM Sans',sans-serif;
  background:#faf8f3;
  padding:40px 20px;
  color:#1a1714;
}

.container{
  max-width:700px;
  margin:auto;
  background:white;
  padding:30px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,.05);
}

h1{
  font-family:'Fraunces',serif;
  font-weight:300;
  margin-bottom:30px;
}

.section{
  margin-bottom:30px;
}

label{
  display:block;
  margin-bottom:8px;
  font-size:14px;
  font-weight:500;
}

input, textarea{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:14px;
  margin-bottom:16px;
}

.age-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.age-card{
  border:2px solid #ddd;
  padding:16px;
  border-radius:14px;
  text-align:center;
  cursor:pointer;
  transition:.2s;
  background:#faf8f3;
}

.age-card.selected{
  border-color:#2d6a4f;
  background:#e8f3ee;
}

.ws-grid{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:15px;
}

.ws-pill{
  padding:10px 14px;
  border-radius:999px;
  border:1px solid #ccc;
  cursor:pointer;
  transition:.2s;
  background:#faf8f3;
}

.ws-pill.selected{
  background:#2d6a4f;
  color:white;
  border-color:#2d6a4f;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:#2d6a4f;
  color:white;
  font-size:15px;
  cursor:pointer;
}

button:disabled{
  opacity:.6;
}

.success{
  display:none;
  text-align:center;
  padding:30px;
}

.error{
  color:#b5381e;
  font-size:13px;
  margin-top:8px;
  display:none;
}

.no-age{
  padding:15px;
  border:1px dashed #ccc;
  border-radius:10px;
  color:#777;
}

</style>
</head>

<body>

<div class="container">

<h1>Zapisy na warsztaty językowe</h1>

<div id="form-wrapper">

<div class="section">
<label>Imię dziecka</label>
<input type="text" id="child-name">

<label>Wiek dziecka</label>
<input type="text" id="child-age">
</div>

<div class="section">

<label>Wybierz grupę wiekową</label>

<div class="age-grid">

<div class="age-card" data-age="4-6">
🌱<br>
4–6 lat
</div>

<div class="age-card" data-age="7-10">
📚<br>
7–10 lat
</div>

<div class="age-card" data-age="11-14">
🚀<br>
11–14 lat
</div>

</div>

</div>

<div class="section">

<label>Tematy warsztatów</label>

<div id="workshops-container">
<div class="no-age">
Najpierw wybierz grupę wiekową ↑
</div>
</div>

<div class="error" id="ws-error">
Wybierz przynajmniej jeden warsztat.
</div>

</div>

<div class="section">

<label>Imię rodzica</label>
<input type="text" id="parent-name">

<label>Email</label>
<input type="email" id="email">

<label>Telefon</label>
<input type="tel" id="phone">

<label>Uwagi</label>
<textarea id="notes"></textarea>

</div>

<button onclick="submitForm()" id="submit-btn">
Wyślij zgłoszenie
</button>

</div>

<div class="success" id="success-screen">
<h2>✓ Formularz wysłany</h2>
<p>Dziękujemy za zgłoszenie.</p>
</div>

</div>

<script>

/* =========================================
   EMAILJS
========================================= */

const EMAILJS_PUBLIC_KEY = "TWOJ_PUBLIC_KEY";
const EMAILJS_SERVICE_ID = "TWOJ_SERVICE_ID";
const EMAILJS_TEMPLATE_ID = "TWOJ_TEMPLATE_ID";

emailjs.init({
  publicKey: EMAILJS_PUBLIC_KEY
});

/* =========================================
   DANE WARSZTATÓW
========================================= */

const workshopsData = {

  "4-6": [
      { id: 'jungle',  label: 'Jungle Adventure', icon: '🌿' },
      { id: 'ocean',   label: 'Under the Ocean',         icon: '🐠' },
      { id: 'chefs',   label: 'Little Chefs',            icon: '👨‍🍳' },
      { id: 'dino',    label: 'Dinosaur Explorers',      icon: '🦕' },
      { id: 'space',   label: 'Space Mission',           icon: '🛸' },
      { id: 'safari',  label: 'Safari Adventure',        icon: '🦁' },
      { id: 'pirate',  label: 'Pirate Island',           icon: '🏴‍☠️' }
  ],

  "7-10": [
      { id: 'jungle',  label: 'Jungle Adventure', icon: '🌿' },
      { id: 'ocean',   label: 'Under the Ocean',         icon: '🐠' },
      { id: 'chefs',   label: 'Little Chefs',            icon: '👨‍🍳' },
      { id: 'dino',    label: 'Dinosaur Explorers',      icon: '🦕' },
      { id: 'space',   label: 'Space Mission',           icon: '🛸' },
      { id: 'safari',  label: 'Safari Adventure',        icon: '🦁' },
      { id: 'pirate',  label: 'Pirate Island',           icon: '🏴‍☠️' }
  ],

  "11-14": [
      { id: 'airport',  label: 'Airport Challenge',              icon: '✈️' },
      { id: 'spy',      label: 'Spy Academy',                    icon: '🕵️' },
      { id: 'youtube',  label: 'YouTube Creator Studio',         icon: '🎬' },
      { id: 'eco',      label: 'Eco Rangers',                    icon: '🌍' },
      { id: 'inventors',label: 'Inventors Lab',                  icon: '💡' },
      { id: 'travel',   label: 'Travel Festival',                icon: '🗺️' },
      { id: 'brand',    label: 'Personal Brand Starter',         icon: '⭐' },
      { id: 'ai',       label: 'Future Jobs & AI',               icon: '🤖', special: 'edycja specjalna' },
      { id: 'debate',   label: 'Teen Debate Club',               icon: '🗣️' },
      { id: 'culture',  label: 'Travel & Culture Talk',          icon: '🌐' },
  ]

};

/* =========================================
   STATE
========================================= */

let selectedAge = null;
let selectedWorkshops = new Set();

/* =========================================
   SELECT AGE
========================================= */

document.querySelectorAll(".age-card").forEach(card => {

  card.addEventListener("click", () => {

    document.querySelectorAll(".age-card")
      .forEach(c => c.classList.remove("selected"));

    card.classList.add("selected");

    selectedAge = card.dataset.age;

    selectedWorkshops.clear();

    renderWorkshops();

  });

});

/* =========================================
   RENDER WORKSHOPS
========================================= */

function renderWorkshops(){

  const container = document.getElementById("workshops-container");

  if(!selectedAge || !workshopsData[selectedAge]){
    container.innerHTML = `
      <div class="no-age">
        Brak warsztatów
      </div>
    `;
    return;
  }

  container.innerHTML = "";

  const grid = document.createElement("div");
  grid.className = "ws-grid";

  workshopsData[selectedAge].forEach(workshop => {

    const pill = document.createElement("div");

    pill.className = "ws-pill";

    pill.innerHTML = workshop.label;

    pill.addEventListener("click", () => {

      if(selectedWorkshops.has(workshop.id)){
        selectedWorkshops.delete(workshop.id);
        pill.classList.remove("selected");
      } else {
        selectedWorkshops.add(workshop.id);
        pill.classList.add("selected");
      }

      document.getElementById("ws-error").style.display = "none";

    });

    grid.appendChild(pill);

  });

  container.appendChild(grid);

}

/* =========================================
   QR AUTOSELECT
========================================= */

function autoSelectAgeFromQR(){

  const params = new URLSearchParams(window.location.search);

  const qrAge = params.get("group");

  if(!qrAge) return;

  const matchingCard = document.querySelector(
    `.age-card[data-age="${qrAge}"]`
  );

  if(matchingCard){

    matchingCard.click();

  }

}

autoSelectAgeFromQR();

/* =========================================
   SUBMIT
========================================= */

async function submitForm(){

  if(!selectedAge){
    alert("Wybierz grupę wiekową");
    return;
  }

  if(selectedWorkshops.size === 0){
    document.getElementById("ws-error").style.display = "block";
    return;
  }

  const btn = document.getElementById("submit-btn");

  btn.disabled = true;
  btn.innerHTML = "Wysyłam...";

  const workshopNames = workshopsData[selectedAge]
    .filter(w => selectedWorkshops.has(w.id))
    .map(w => w.label)
    .join(", ");

  const params = {

    child_name:
      document.getElementById("child-name").value,

    child_age:
      document.getElementById("child-age").value,

    parent_name:
      document.getElementById("parent-name").value,

    email:
      document.getElementById("email").value,

    phone:
      document.getElementById("phone").value,

    notes:
      document.getElementById("notes").value,

    age_group:
      selectedAge,

    workshops:
      workshopNames

  };

  try {

    await emailjs.send(
      EMAILJS_SERVICE_ID,
      EMAILJS_TEMPLATE_ID,
      params
    );

    document.getElementById("form-wrapper").style.display = "none";

    document.getElementById("success-screen").style.display = "block";

    window.scrollTo({
      top:0,
      behavior:"smooth"
    });

  } catch(err){

    console.error(err);

    alert("Błąd wysyłki formularza");

    btn.disabled = false;
    btn.innerHTML = "Wyślij zgłoszenie";

  }

}

</script>

</body>
</html>
